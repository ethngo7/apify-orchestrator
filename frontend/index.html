<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apify Actor Orchestrator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const API_BASE = "http://localhost:8000";

    // ── Small reusable components ──────────────────────────────────────────────

    function Badge({ children, color = "gray" }) {
      const colors = {
        gray:   "bg-gray-700 text-gray-200",
        green:  "bg-green-800 text-green-200",
        red:    "bg-red-800 text-red-200",
        yellow: "bg-yellow-800 text-yellow-200",
        blue:   "bg-blue-800 text-blue-200",
      };
      return (
        <span className={`inline-block px-2 py-0.5 rounded text-xs font-mono font-semibold ${colors[color]}`}>
          {children}
        </span>
      );
    }

    function StatusBadge({ status }) {
      const map = {
        SUCCEEDED: "green",
        FAILED:    "red",
        TIMED_OUT: "red",
        ABORTED:   "red",
        RUNNING:   "yellow",
        READY:     "blue",
      };
      return <Badge color={map[status] ?? "gray"}>{status}</Badge>;
    }

    function StepCard({ step }) {
      const result = step.result;
      return (
        <div className="border border-gray-700 rounded-lg p-4 space-y-2">
          <div className="flex items-center gap-3 flex-wrap">
            <span className="font-mono text-xs text-gray-400">#{step.step_number}</span>
            <span className="font-semibold text-sm text-white">{step.actor_id}</span>
            {result && <StatusBadge status={result.status} />}
            {result && (
              <span className="text-xs text-gray-400">
                {result.item_count} item{result.item_count !== 1 ? "s" : ""}
              </span>
            )}
          </div>
          <p className="text-sm text-gray-300">{step.description}</p>
          {result?.error_message && (
            <p className="text-xs text-red-400 font-mono">{result.error_message}</p>
          )}
          {result?.items?.length > 0 && (
            <details className="mt-1">
              <summary className="cursor-pointer text-xs text-gray-400 hover:text-gray-200">
                Preview top {Math.min(3, result.items.length)} item{result.items.length !== 1 ? "s" : ""}
              </summary>
              <pre className="mt-2 text-xs bg-gray-900 rounded p-3 overflow-x-auto text-gray-300 max-h-60">
                {JSON.stringify(result.items.slice(0, 3), null, 2)}
              </pre>
            </details>
          )}
        </div>
      );
    }

    function ResultPanel({ data }) {
      return (
        <div className="space-y-6 mt-6">

          {/* Summary bar */}
          <div className="flex flex-wrap gap-3 items-center text-sm">
            <Badge color="blue">
              {data.iterations_used} / 5 iterations
            </Badge>
            <Badge color="blue">
              {data.total_items_collected} items collected
            </Badge>
            <Badge color={data.mock_mode ? "yellow" : "green"}>
              {data.mock_mode ? "MOCK MODE" : "LIVE"}
            </Badge>
          </div>

          {/* Final answer */}
          <div className="bg-gray-800 rounded-xl p-5 space-y-2">
            <h2 className="text-xs font-semibold uppercase tracking-widest text-gray-400">
              Answer
            </h2>
            <p className="text-gray-100 leading-relaxed whitespace-pre-wrap">
              {data.final_answer}
            </p>
          </div>

          {/* Plan reasoning */}
          <div className="bg-gray-800 rounded-xl p-5 space-y-2">
            <h2 className="text-xs font-semibold uppercase tracking-widest text-gray-400">
              Plan reasoning
            </h2>
            <p className="text-sm text-gray-300">{data.plan.reasoning}</p>
          </div>

          {/* Steps */}
          <div className="space-y-3">
            <h2 className="text-xs font-semibold uppercase tracking-widest text-gray-400">
              Steps executed ({data.steps_executed.length})
            </h2>
            {data.steps_executed.map((step) => (
              <StepCard key={step.step_number} step={step} />
            ))}
          </div>
        </div>
      );
    }

    // ── Demo query buttons ─────────────────────────────────────────────────────

    const DEMO_QUERIES = [
      "Find me the top AI startups in SF, their founders' LinkedIn profiles, and what people are saying about them on Reddit",
      "What are people saying about OpenAI on Reddit and Twitter this week?",
      "Build me a lead list of fintech companies in NYC — find them on Google Maps, then find their decision makers on LinkedIn",
    ];

    // ── Main app ───────────────────────────────────────────────────────────────

    function App() {
      const [query, setQuery]     = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const [result, setResult]   = React.useState(null);
      const [error, setError]     = React.useState(null);

      async function handleSubmit(e) {
        e.preventDefault();
        const q = query.trim();
        if (!q) return;
        setLoading(true);
        setResult(null);
        setError(null);
        try {
          const res = await fetch(`${API_BASE}/orchestrate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_query: q }),
          });
          const json = await res.json();
          if (!res.ok) {
            setError(json.detail ?? `HTTP ${res.status}`);
          } else {
            setResult(json);
          }
        } catch (err) {
          setError(err.message ?? "Network error — is the server running?");
        } finally {
          setLoading(false);
        }
      }

      function fillDemo(q) {
        setQuery(q);
        setResult(null);
        setError(null);
      }

      return (
        <div className="max-w-3xl mx-auto px-4 py-12 space-y-8">

          {/* Header */}
          <div className="space-y-1">
            <h1 className="text-2xl font-bold tracking-tight text-white">
              Apify Actor Orchestrator
            </h1>
            <p className="text-sm text-gray-400">
              Ask a question — the agent selects and chains the right Apify actors automatically.
            </p>
          </div>

          {/* Demo query pills */}
          <div className="space-y-2">
            <p className="text-xs text-gray-500 uppercase tracking-widest">Demo queries</p>
            <div className="flex flex-col gap-2">
              {DEMO_QUERIES.map((q) => (
                <button
                  key={q}
                  onClick={() => fillDemo(q)}
                  className="text-left text-sm text-blue-300 hover:text-blue-100 bg-gray-800 hover:bg-gray-700 rounded-lg px-4 py-2 transition-colors"
                >
                  {q}
                </button>
              ))}
            </div>
          </div>

          {/* Input form */}
          <form onSubmit={handleSubmit} className="space-y-3">
            <textarea
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              rows={3}
              placeholder="Ask anything — e.g. 'What are people saying about OpenAI on Reddit this week?'"
              className="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 resize-none"
              onKeyDown={(e) => {
                if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) handleSubmit(e);
              }}
            />
            <button
              type="submit"
              disabled={loading || !query.trim()}
              className="w-full py-2.5 rounded-xl font-semibold text-sm bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
            >
              {loading ? "Running agent…" : "Run"}
            </button>
            <p className="text-xs text-gray-500 text-right">Cmd/Ctrl+Enter to submit</p>
          </form>

          {/* Loading spinner */}
          {loading && (
            <div className="flex items-center gap-3 text-sm text-gray-400">
              <svg className="animate-spin h-4 w-4 text-blue-400" viewBox="0 0 24 24" fill="none">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
              </svg>
              Parsing → planning → executing → synthesizing…
            </div>
          )}

          {/* Error */}
          {error && (
            <div className="bg-red-900/40 border border-red-700 rounded-xl px-4 py-3 text-sm text-red-300">
              {error}
            </div>
          )}

          {/* Result */}
          {result && <ResultPanel data={result} />}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
